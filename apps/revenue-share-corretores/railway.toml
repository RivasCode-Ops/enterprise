# Railway: definir no serviço Web o Root Directory = apps/revenue-share-corretores
# (raiz do clone GitHub = repo enterprise). Opcional: "Railway Config File" = railway.toml nesta pasta.

[build]
builder = "nixpacks"
# Equivalente a: composer install --no-dev --optimize-autoloader; npm ci; npm run build
buildCommand = "composer install --no-dev --optimize-autoloader --no-interaction && npm ci && npm run build"

[deploy]
startCommand = "/bin/sh -c 'php artisan migrate --force && php artisan db:seed --force && php artisan storage:link 2>/dev/null || true && exec php artisan serve --host=0.0.0.0 --port=$PORT'"
healthcheckPath = "/"
healthcheckTimeout = 120
